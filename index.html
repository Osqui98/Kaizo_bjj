<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kaizō BJJ — Asistencia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c0392b; --red-dark: #96281b; --red-light: #fdf0ef;
    --black: #111111; --white: #ffffff;
    --gray-500: #888; --gray-200: #e8e8e8; --gray-100: #f5f5f5;
    --green: #27ae60; --radius: 14px; --radius-sm: 8px;
  }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

  .header { padding: 1.5rem 1.25rem 1rem; display: flex; align-items: center; gap: 12px; }
  .logo { width: 42px; height: 42px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--white); border: 2px solid #e74c3c; flex-shrink: 0; }
  .header-text h1 { font-size: 17px; font-weight: 600; }
  .header-text p { font-size: 12px; color: var(--gray-500); margin-top: 1px; }

  .turno-chip { margin: 0 1.25rem 1.5rem; background: #1e1e1e; border: 1px solid #333; border-radius: 99px; padding: 6px 14px; font-size: 13px; color: var(--gray-500); display: flex; align-items: center; gap: 8px; width: fit-content; }
  .turno-chip span { color: var(--white); font-weight: 500; }

  .card { background: var(--white); border-radius: var(--radius) var(--radius) 0 0; padding: 1.75rem 1.25rem 2rem; flex: 1; color: var(--black); }
  .card h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .card .subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 1.5rem; }

  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-500); }
  .search-wrap input { width: 100%; padding: 12px 12px 12px 40px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; color: var(--black); background: var(--gray-100); outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--red); background: var(--white); }

  .alumno-list { display: flex; flex-direction: column; gap: 8px; max-height: 360px; overflow-y: auto; }
  .alumno-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; background: var(--white); }
  .alumno-item:hover { border-color: var(--red); background: var(--red-light); }
  .alumno-item.selected { border-color: var(--red); background: var(--red-light); }
  .alumno-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--gray-200); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #444; flex-shrink: 0; }
  .alumno-item.selected .alumno-avatar { background: var(--red); color: var(--white); }
  .alumno-info { flex: 1; }
  .alumno-nombre { font-size: 15px; font-weight: 600; }
  .alumno-turno { font-size: 12px; color: var(--gray-500); margin-top: 1px; }
  .check-icon { color: var(--red); display: none; }
  .alumno-item.selected .check-icon { display: block; }

  .btn-confirm { width: 100%; padding: 15px; background: var(--red); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 1.5rem; transition: background 0.2s, transform 0.1s; display: none; }
  .btn-confirm:active { transform: scale(0.98); background: var(--red-dark); }
  .btn-confirm.visible { display: block; }

  .empty { text-align: center; padding: 2rem 0; color: var(--gray-500); font-size: 14px; display: none; }

  .loading { text-align: center; padding: 2rem 0; color: var(--gray-500); font-size: 14px; }
  .loading-dot { display: inline-block; width: 6px; height: 6px; background: var(--red); border-radius: 50%; margin: 0 2px; animation: bounce 1s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* SUCCESS */
  .success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 2rem; text-align: center; background: var(--white); border-radius: var(--radius) var(--radius) 0 0; color: var(--black); }
  .success-screen.show { display: flex; }
  .card.hide { display: none; }
  .success-circle { width: 80px; height: 80px; border-radius: 50%; background: #e8f8ef; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
  .success-circle svg { color: var(--green); }
  .success-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .success-screen p { font-size: 15px; color: var(--gray-500); }
  .success-turno { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
  .btn-volver { margin-top: 2rem; padding: 12px 28px; background: var(--gray-100); border: none; border-radius: var(--radius-sm); font-size: 14px; color: #444; cursor: pointer; }

  .ya-registro { background: #fff8e6; border: 1.5px solid #f0c040; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #856404; margin-top: 1rem; display: none; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">BJJ</div>
  <div class="header-text">
    <h1>Kaizō BJJ</h1>
    <p>Brazilian Jiu-Jitsu · Mataderos</p>
  </div>
</div>

<div class="turno-chip" id="turno-chip">
  📅 <span id="turno-label">Cargando...</span>
</div>

<div class="card" id="main-card">
  <h2>¡Bienvenido!</h2>
  <p class="subtitle">Seleccioná tu nombre para registrar asistencia</p>

  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar nombre..." oninput="filtrar()" autocomplete="off" />
  </div>

  <div class="loading" id="loading">
    <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
  </div>
  <div class="alumno-list" id="alumno-list"></div>
  <div class="empty" id="empty-msg">No se encontró ese nombre.</div>
  <div class="ya-registro" id="ya-registro">⚠️ Ya registraste tu asistencia hoy en este turno.</div>

  <button class="btn-confirm" id="btn-confirm" onclick="confirmarAsistencia()">
    ✓ Confirmar asistencia
  </button>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-circle">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M20 6 9 17l-5-5"/>
    </svg>
  </div>
  <h2>¡Asistencia registrada!</h2>
  <p id="success-nombre"></p>
  <p class="success-turno" id="success-turno"></p>
  <button class="btn-volver" onclick="volver()">← Volver</button>
</div>

<script>
// ─── SUPABASE CONFIG ─────────────────────────────────
const SUPABASE_URL = 'https://whaqfschfxztiuhvqwam.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoYXFmc2NoZnh6dGl1aHZxd2FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTM0NjgsImV4cCI6MjA5NzYyOTQ2OH0.cKmCBX-BrvdveqSdFvbDH0dOyOB-cPPwYRvEiPpDpRs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── URL PARAMS ──────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const turnoParam = params.get('turno') || 'Clase';
const horaParam  = params.get('hora')  || '';
const fechaParam = params.get('fecha') || new Date().toISOString().slice(0,10);

function formatFecha(iso) {
  const [y,m,d] = iso.split('-');
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
}

document.getElementById('turno-label').textContent =
  `${turnoParam}  ${horaParam}  ·  ${formatFecha(fechaParam)}`;

// ─── STATE ───────────────────────────────────────────
let alumnos = [];
let seleccionado = null;

// ─── CARGAR ALUMNOS DESDE SUPABASE ───────────────────
async function cargarAlumnos() {
  try {
    const { data, error } = await sb
      .from('alumnos')
      .select('id, nombre, turno')
      .eq('activo', true)
      .order('nombre');
    if (error) throw error;
    alumnos = data || [];
  } catch(e) {
    console.error(e);
    alumnos = [];
  }
  document.getElementById('loading').style.display = 'none';
  render(alumnos);
}

// ─── RENDER ──────────────────────────────────────────
function render(lista) {
  const ul    = document.getElementById('alumno-list');
  const empty = document.getElementById('empty-msg');
  if (!lista.length) { ul.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  ul.innerHTML = lista.map(a => {
    const ini = a.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const sel = seleccionado?.id === a.id;
    return `<div class="alumno-item${sel?' selected':''}" onclick="seleccionar(${a.id})">
      <div class="alumno-avatar">${ini}</div>
      <div class="alumno-info">
        <div class="alumno-nombre">${a.nombre}</div>
        <div class="alumno-turno">${a.turno || ''}</div>
      </div>
      <svg class="check-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>`;
  }).join('');
}

function filtrar() {
  const q = document.getElementById('search').value.toLowerCase();
  render(alumnos.filter(a => a.nombre.toLowerCase().includes(q)));
  document.getElementById('ya-registro').style.display = 'none';
}

function seleccionar(id) {
  seleccionado = alumnos.find(a => a.id === id);
  document.getElementById('btn-confirm').classList.add('visible');
  document.getElementById('ya-registro').style.display = 'none';
  filtrar();
}

// ─── CONFIRMAR ───────────────────────────────────────
async function confirmarAsistencia() {
  if (!seleccionado) return;
  const btn = document.getElementById('btn-confirm');
  btn.textContent = 'Registrando...';
  btn.disabled = true;

  try {
    // Verificar si ya registró hoy en este turno
    const { data: yaExiste } = await sb
      .from('asistencia')
      .select('id')
      .eq('alumno_id', seleccionado.id)
      .eq('fecha', fechaParam)
      .eq('turno', turnoParam)
      .maybeSingle();

    if (yaExiste) {
      document.getElementById('ya-registro').style.display = 'block';
      btn.textContent = '✓ Confirmar asistencia';
      btn.disabled = false;
      return;
    }

    // Registrar asistencia
    const { error } = await sb.from('asistencia').insert({
      alumno_id : seleccionado.id,
      nombre    : seleccionado.nombre,
      fecha     : fechaParam,
      turno     : turnoParam,
      horario   : horaParam,
      timestamp : new Date().toISOString()
    });

    if (error) throw error;

    document.getElementById('main-card').classList.add('hide');
    document.getElementById('success-screen').classList.add('show');
    document.getElementById('success-nombre').textContent = seleccionado.nombre;
    document.getElementById('success-turno').textContent =
      `${turnoParam} · ${horaParam} · ${formatFecha(fechaParam)}`;

  } catch(e) {
    console.error(e);
    btn.textContent = '✓ Confirmar asistencia';
    btn.disabled = false;
    alert('Error al registrar. Intentá de nuevo.');
  }
}

function volver() {
  seleccionado = null;
  document.getElementById('btn-confirm').classList.remove('visible');
  document.getElementById('main-card').classList.remove('hide');
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('search').value = '';
  document.getElementById('ya-registro').style.display = 'none';
  filtrar();
}

cargarAlumnos();
</script>
</body>
</html>
