<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kaizō BJJ — Asistencia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #c0392b;
    --red-dark: #96281b;
    --red-light: #fdf0ef;
    --black: #111111;
    --gray-900: #1a1a1a;
    --gray-700: #444;
    --gray-500: #888;
    --gray-200: #e8e8e8;
    --gray-100: #f5f5f5;
    --white: #ffffff;
    --green: #27ae60;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 1.5rem 1.25rem 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--white);
    border: 2px solid #e74c3c;
    flex-shrink: 0;
  }

  .header-text h1 { font-size: 17px; font-weight: 600; }
  .header-text p { font-size: 12px; color: var(--gray-500); margin-top: 1px; }

  .turno-chip {
    margin: 0 1.25rem 1.5rem;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--gray-500);
    display: flex; align-items: center; gap: 8px;
    width: fit-content;
  }

  .turno-chip span { color: var(--white); font-weight: 500; }

  .card {
    background: var(--white);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 1.75rem 1.25rem 2rem;
    flex: 1;
    color: var(--black);
  }

  .card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .card .subtitle {
    font-size: 14px;
    color: var(--gray-500);
    margin-bottom: 1.5rem;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 1rem;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--gray-500);
  }

  .search-wrap input {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 15px;
    color: var(--black);
    background: var(--gray-100);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--red); background: var(--white); }

  .alumno-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }

  .alumno-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--white);
  }

  .alumno-item:hover { border-color: var(--red); background: var(--red-light); }
  .alumno-item.selected { border-color: var(--red); background: var(--red-light); }

  .alumno-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--gray-700);
    flex-shrink: 0;
  }

  .alumno-item.selected .alumno-avatar { background: var(--red); color: var(--white); }

  .alumno-info { flex: 1; }
  .alumno-nombre { font-size: 15px; font-weight: 600; }
  .alumno-turno { font-size: 12px; color: var(--gray-500); margin-top: 1px; }

  .check-icon { color: var(--red); display: none; }
  .alumno-item.selected .check-icon { display: block; }

  .btn-confirm {
    width: 100%;
    padding: 15px;
    background: var(--red);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: background 0.2s, transform 0.1s;
    display: none;
  }

  .btn-confirm:active { transform: scale(0.98); background: var(--red-dark); }
  .btn-confirm.visible { display: block; }

  .empty {
    text-align: center;
    padding: 2rem 0;
    color: var(--gray-500);
    font-size: 14px;
  }

  /* SUCCESS SCREEN */
  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 2rem;
    text-align: center;
    background: var(--white);
    border-radius: var(--radius) var(--radius) 0 0;
    color: var(--black);
  }

  .success-screen.show { display: flex; }
  .card.hide { display: none; }

  .success-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: #e8f8ef;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
  }

  .success-circle svg { color: var(--green); }
  .success-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .success-screen p { font-size: 15px; color: var(--gray-500); }
  .success-turno { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

  .btn-volver {
    margin-top: 2rem;
    padding: 12px 28px;
    background: var(--gray-100);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--gray-700);
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">BJJ</div>
  <div class="header-text">
    <h1>Kaizō BJJ</h1>
    <p>Brazilian Jiu-Jitsu · Mataderos</p>
  </div>
</div>

<div class="turno-chip" id="turno-chip">
  📅 <span id="turno-label">Cargando turno...</span>
</div>

<div class="card" id="main-card">
  <h2>¡Bienvenido!</h2>
  <p class="subtitle">Seleccioná tu nombre para registrar asistencia</p>

  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar nombre..." oninput="filtrar()" autocomplete="off" />
  </div>

  <div class="alumno-list" id="alumno-list"></div>
  <div class="empty" id="empty-msg" style="display:none">No se encontró ese nombre.</div>

  <button class="btn-confirm" id="btn-confirm" onclick="confirmarAsistencia()">
    ✓ Confirmar asistencia
  </button>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-circle">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M20 6 9 17l-5-5"/>
    </svg>
  </div>
  <h2>¡Asistencia registrada!</h2>
  <p id="success-nombre"></p>
  <p class="success-turno" id="success-turno"></p>
  <button class="btn-volver" onclick="volver()">← Volver</button>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────
// Reemplazá con tu Google Apps Script Web App URL
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoedFRvfeyKJAw9KEcDfhGoXhK08pg_QzhQpBVbU5puT_IKHzEq2wUWutl_YQJRTHZ/exec';

// ─── DATOS DE EJEMPLO (se reemplaza con llamada real al script) ────────
const alumnosDEMO = [
  {nombre: 'Matías García', turno: 'Mañana · Lun/Mie/Vie'},
  {nombre: 'Laura Pérez', turno: 'Noche · Lun/Mar/Jue'},
  {nombre: 'Rodrigo Sánchez', turno: 'Mañana · Lun/Mie/Vie'},
  {nombre: 'Valeria Martínez', turno: 'Sábado · 11:00'},
  {nombre: 'Iván Castillo', turno: 'Noche · Lun/Mar/Jue'},
  {nombre: 'Sofía Romero', turno: 'Mañana · Lun/Mie/Vie'},
  {nombre: 'Nicolás López', turno: 'Noche · Lun/Mar/Jue'},
  {nombre: 'Camila Torres', turno: 'Sábado · 11:00'},
];

let alumnos = [...alumnosDEMO];
let seleccionado = null;

// ─── LEER PARÁMETROS DE LA URL ─────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const turnoParam = params.get('turno') || 'Clase';
const horaParam  = params.get('hora')  || '';
const fechaParam = params.get('fecha') || new Date().toISOString().slice(0,10);

function formatFecha(iso) {
  const [y,m,d] = iso.split('-');
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
}

document.getElementById('turno-label').textContent =
  `${turnoParam}  ${horaParam}  ·  ${formatFecha(fechaParam)}`;

// ─── RENDER ────────────────────────────────────────────────────────────
function render(lista) {
  const ul = document.getElementById('alumno-list');
  const empty = document.getElementById('empty-msg');
  if (!lista.length) { ul.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  ul.innerHTML = lista.map(a => {
    const ini = a.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const sel = seleccionado === a.nombre;
    return `<div class="alumno-item${sel?' selected':''}" onclick="seleccionar('${a.nombre.replace(/'/,"\\'")}')">
      <div class="alumno-avatar">${ini}</div>
      <div class="alumno-info">
        <div class="alumno-nombre">${a.nombre}</div>
        <div class="alumno-turno">${a.turno}</div>
      </div>
      <svg class="check-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>`;
  }).join('');
}

function filtrar() {
  const q = document.getElementById('search').value.toLowerCase();
  render(alumnos.filter(a => a.nombre.toLowerCase().includes(q)));
}

function seleccionar(nombre) {
  seleccionado = nombre;
  document.getElementById('btn-confirm').classList.toggle('visible', true);
  filtrar();
}

// ─── CONFIRMAR ─────────────────────────────────────────────────────────
async function confirmarAsistencia() {
  if (!seleccionado) return;
  const btn = document.getElementById('btn-confirm');
  btn.textContent = 'Registrando...';
  btn.disabled = true;

  const payload = {
    nombre: seleccionado,
    turno: turnoParam,
    hora: horaParam,
    fecha: fechaParam,
    timestamp: new Date().toISOString()
  };

  try {
    // En producción: POST al Apps Script
    if (SCRIPT_URL !== 'TU_APPS_SCRIPT_URL_AQUI') {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
    }
    // Mostrar pantalla de éxito
    document.getElementById('main-card').classList.add('hide');
    const ss = document.getElementById('success-screen');
    ss.classList.add('show');
    document.getElementById('success-nombre').textContent = seleccionado;
    document.getElementById('success-turno').textContent =
      `${turnoParam} · ${horaParam} · ${formatFecha(fechaParam)}`;
  } catch(e) {
    btn.textContent = '✓ Confirmar asistencia';
    btn.disabled = false;
    alert('Error al registrar. Intentá de nuevo.');
  }
}

function volver() {
  seleccionado = null;
  document.getElementById('btn-confirm').classList.remove('visible');
  document.getElementById('main-card').classList.remove('hide');
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('search').value = '';
  filtrar();
}

// ─── CARGAR ALUMNOS REALES DESDE APPS SCRIPT ──────────────────────────
async function cargarAlumnos() {
  if (SCRIPT_URL === 'TU_APPS_SCRIPT_URL_AQUI') { render(alumnos); return; }
  try {
    const res = await fetch(SCRIPT_URL + '?action=alumnos');
    const data = await res.json();
    if (data && data.length) alumnos = data;
  } catch(e) { /* usa demo */ }
  render(alumnos);
}

cargarAlumnos();
</script>
</body>
</html>
