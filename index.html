<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kaizō BJJ — Asistencia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="logo.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #c0392b; --red-dark: #96281b; --red-light: #fdf0ef;
  --black: #111; --white: #fff;
  --gray-600: #666; --gray-500: #888; --gray-200: #e8e8e8; --gray-100: #f5f5f5;
  --green: #27ae60; --orange: #e67e22;
  --radius: 14px; --radius-sm: 8px;
}
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }
.header { padding: 1rem 1.25rem 0.75rem; display: flex; align-items: center; gap: 12px; }
.logo-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.header-text h1 { font-size: 17px; font-weight: 700; }
.header-text p { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
.hora-actual { margin-left: auto; text-align: right; }
.hora-actual .hora { font-size: 18px; font-weight: 700; }
.hora-actual .dia { font-size: 11px; color: var(--gray-500); }
.card { background: var(--white); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1.25rem 2rem; flex: 1; color: var(--black); }
.no-clase-header { text-align: center; padding: 1rem 0 1.25rem; }
.no-clase-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.no-clase-header p { font-size: 14px; color: var(--gray-500); }
.sec-label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.clase-hoy-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: var(--gray-100); border-radius: var(--radius-sm); margin-bottom: 8px; }
.clase-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.clase-dot.activa { background: var(--red); }
.clase-dot.proxima { background: var(--orange); }
.clase-dot.pasada { background: var(--gray-200); }
.clase-hoy-info { flex: 1; }
.clase-hoy-nombre { font-size: 14px; font-weight: 600; }
.clase-hoy-sub { font-size: 12px; color: var(--gray-500); margin-top: 1px; }
.clase-hoy-hora { font-size: 13px; font-weight: 600; color: var(--gray-600); }
.fisico-tag { font-size: 11px; color: var(--orange); margin-top: 2px; }
.semana-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
.semana-dia { background: var(--gray-100); border-radius: var(--radius-sm); padding: 10px 8px; }
.semana-dia-nom { font-size: 11px; font-weight: 700; color: var(--gray-500); margin-bottom: 6px; text-transform: uppercase; }
.semana-clase { font-size: 11px; color: var(--black); line-height: 1.4; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--gray-200); }
.semana-clase:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.semana-clase .sh { font-weight: 700; color: var(--red); }
.clase-activa-banner { background: var(--red); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
.banner-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: pulse 1.5s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.banner-info { flex: 1; }
.banner-nombre { font-size: 14px; font-weight: 700; color: #fff; }
.banner-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 1px; }
.banner-hora { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 600; }
.fisico-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-top: 4px; display: inline-block; }
.card h2 { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
.card .subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 1.25rem; }
.dni-wrap { display: flex; gap: 8px; margin-bottom: 1rem; }
.dni-input { flex: 1; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 20px; font-weight: 700; color: var(--black); background: var(--gray-100); outline: none; letter-spacing: 2px; text-align: center; transition: border-color 0.2s; }
.dni-input:focus { border-color: var(--red); background: var(--white); }
.btn-buscar { padding: 14px 20px; background: var(--red); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
.dni-hint { font-size: 12px; color: var(--gray-500); text-align: center; margin-bottom: 1rem; }
.alumno-confirm-card { background: var(--gray-100); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 1rem; display: flex; align-items: center; gap: 14px; }
.alumno-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--red-light); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--red); flex-shrink: 0; }
.alumno-confirm-name { font-size: 17px; font-weight: 700; }
.alumno-confirm-sub { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
.form-field { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; display: block; }
.form-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; color: var(--black); background: var(--gray-100); outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: var(--red); background: var(--white); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sexo-opts { display: flex; gap: 8px; }
.sexo-btn { flex: 1; padding: 10px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; background: var(--gray-100); color: #444; cursor: pointer; text-align: center; transition: all 0.15s; }
.sexo-btn.selected { border-color: var(--red); background: var(--red-light); color: var(--red); font-weight: 700; }
.error-msg { background: var(--red-light); border: 1px solid #f09595; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 12px; display: none; }
.btn-primary { width: 100%; padding: 14px; background: var(--red); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.btn-primary.orange { background: var(--orange); }
.btn-secondary { width: 100%; padding: 11px; background: transparent; color: var(--gray-600); border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; margin-top: 8px; }
.loading { text-align: center; padding: 2rem 0; color: var(--gray-500); }
.loading-dot { display: inline-block; width: 6px; height: 6px; background: var(--red); border-radius: 50%; margin: 0 2px; animation: bounce 1s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)} }
.ya-registro { background: #fff8e6; border: 1.5px solid #f0c040; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #856404; margin-bottom: 12px; text-align: center; display: none; }
.tarde-screen { display: none; flex-direction: column; flex: 1; background: var(--white); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1.25rem 2rem; color: var(--black); }
.tarde-screen.show { display: flex; }
.motivo-list { display: flex; flex-direction: column; gap: 8px; margin: 1rem 0; }
.motivo-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
.motivo-item:hover { border-color: var(--orange); background: #fff9f0; }
.motivo-item.selected { border-color: var(--orange); background: #fff5e6; }
.motivo-check { color: var(--orange); display: none; }
.motivo-item.selected .motivo-check { display: block; }
.otro-input { width: 100%; padding: 11px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; color: var(--black); background: var(--gray-100); outline: none; display: none; margin-top: 6px; }
.otro-input.visible { display: block; }
.success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 2rem; text-align: center; background: var(--white); border-radius: var(--radius) var(--radius) 0 0; color: var(--black); }
.success-screen.show { display: flex; }
.card.hide, .tarde-screen.hide { display: none !important; }
.success-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
.success-circle.green { background: #e8f8ef; }
.success-circle.orange { background: #fff5e6; }
.success-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.success-sub { font-size: 14px; color: var(--gray-500); }
.success-clase { font-size: 13px; color: var(--red); margin-top: 6px; font-weight: 600; }
.success-tarde-msg { font-size: 13px; color: var(--orange); margin-top: 4px; display: none; }
.success-fisico { font-size: 13px; color: var(--orange); margin-top: 4px; display: none; }
.btn-volver { margin-top: 2rem; padding: 11px 28px; background: var(--gray-100); border: none; border-radius: var(--radius-sm); font-size: 14px; color: #444; cursor: pointer; }
@media (min-width: 600px) {
  body { background: #1a1a1a; align-items: center; }
  .header { max-width: 480px; width: 100%; }
  .card { max-width: 480px; margin: 0 auto; border-radius: var(--radius); margin-top: 2rem; flex: none; }
  .tarde-screen, .success-screen { max-width: 480px; width: 100%; border-radius: var(--radius); margin-top: 1rem; flex: none; padding-bottom: 2rem; }
}
</style>
</head>
<body>

<div class="header">
  <img id="kaizo-logo" class="logo-img" alt="Kaizo BJJ" />
  <div class="header-text">
    <h1>Kaizō BJJ</h1>
    <p>Brazilian Jiu-Jitsu · Mataderos</p>
  </div>
  <div class="hora-actual">
    <div class="hora" id="hora-display">--:--</div>
    <div class="dia" id="dia-display">--</div>
  </div>
</div>

<div class="card" id="main-card">
  <div id="contenido-principal">
    <div class="loading">
      <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
    </div>
  </div>
</div>

<div class="tarde-screen" id="tarde-screen">
  <div style="margin-bottom:1.25rem">
    <h2 style="font-size:19px;font-weight:700;margin-bottom:4px">Llegada tarde</h2>
    <p style="font-size:14px;color:var(--gray-500)" id="tarde-nombre-sub"></p>
  </div>
  <div style="display:inline-block;background:#fff5e6;color:#854F0B;font-size:13px;font-weight:600;padding:4px 12px;border-radius:99px;margin-bottom:1rem" id="tarde-minutos"></div>
  <p style="font-size:14px;color:#444;margin-bottom:4px">Cual fue el motivo?</p>
  <div class="motivo-list">
    <div class="motivo-item" onclick="selMotivo(this, 'Llegue tarde por trabajo')">
      <span style="font-size:18px">&#x1F4BC;</span>
      <span style="font-size:14px;font-weight:500;flex:1">Llegue tarde por trabajo</span>
      <svg class="motivo-check" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div class="motivo-item" onclick="selMotivo(this, 'Problema de transporte')">
      <span style="font-size:18px">&#x1F68C;</span>
      <span style="font-size:14px;font-weight:500;flex:1">Problema de transporte</span>
      <svg class="motivo-check" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div class="motivo-item" onclick="selMotivo(this, 'Motivo personal')">
      <span style="font-size:18px">&#x1F64F;</span>
      <span style="font-size:14px;font-weight:500;flex:1">Motivo personal</span>
      <svg class="motivo-check" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div class="motivo-item" onclick="selMotivo(this, 'otro')">
      <span style="font-size:18px">&#x270F;&#xFE0F;</span>
      <span style="font-size:14px;font-weight:500;flex:1">Otro</span>
      <svg class="motivo-check" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
  </div>
  <input type="text" id="otro-texto" class="otro-input" placeholder="Contanos brevemente..." />
  <button class="btn-primary orange" id="btn-tarde" style="display:none" onclick="confirmarTarde()">Registrar asistencia</button>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-circle" id="success-circle">
    <svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
  </div>
  <h2 id="success-title">Asistencia registrada!</h2>
  <p class="success-sub" id="success-nombre"></p>
  <p class="success-clase" id="success-clase"></p>
  <p class="success-tarde-msg" id="success-tarde-msg"></p>
  <p class="success-fisico" id="success-fisico">Con fisico</p>
  <button class="btn-volver" onclick="volver()">Volver</button>
</div>

<script>
const SUPABASE_URL = 'https://whaqfschfxztiuhvqwam.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoYXFmc2NoZnh6dGl1aHZxd2FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTM0NjgsImV4cCI6MjA5NzYyOTQ2OH0.cKmCBX-BrvdveqSdFvbDH0dOyOB-cPPwYRvEiPpDpRs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CLASES = [
  { dias:[1,3],   hi:'07:00', hf:'09:00', nombre:'BJJ Adultos Manana',     profe:'Prof. Leo',    turno:'manana',  fisico:false },
  { dias:[5],     hi:'07:00', hf:'09:00', nombre:'BJJ Adultos Manana NoGi', profe:'Prof. Fabian', turno:'manana',  fisico:false },
  { dias:[1,2,4], hi:'19:00', hf:'22:00', nombre:'BJJ Adultos Noche',       profe:'Prof. Lobo',   turno:'noche',   fisico:true,  hf_fisico:'20:00' },
  { dias:[6],     hi:'11:00', hf:'14:00', nombre:'BJJ Adultos Sabado',      profe:'Prof. Leo',    turno:'sabado',  fisico:true,  hf_fisico:'12:00' },
];
const DIAS_NOMBRE   = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
const DIAS_COMPLETO = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
const MARGEN_MIN = 45;

let ahora = new Date();
let claseActiva = null;
let esTarde = false;
let minutosTarde = 0;
let motivoSeleccionado = null;
let toleranciaMin = 15;
let alumnoActual = null;
let sexoSeleccionado = null;

function actualizarReloj() {
  ahora = new Date();
  const h = ahora.getHours().toString().padStart(2,'0');
  const m = ahora.getMinutes().toString().padStart(2,'0');
  document.getElementById('hora-display').textContent = h + ':' + m;
  document.getElementById('dia-display').textContent = DIAS_COMPLETO[ahora.getDay()];
}
setInterval(actualizarReloj, 10000);
actualizarReloj();

function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function minAhora() { return ahora.getHours()*60+ahora.getMinutes(); }
function fechaHoy() { return ahora.toISOString().slice(0,10); }
function normDNI(v) { return v.replace(/[^0-9]/g,''); }

function detectarClase() {
  const d = ahora.getDay(), ma = minAhora();
  for (const c of CLASES) {
    if (!c.dias.includes(d)) continue;
    if (ma >= toMin(c.hi) - MARGEN_MIN && ma <= toMin(c.hf) + MARGEN_MIN) return c;
  }
  return null;
}

function estadoClase(c) {
  const ma = minAhora(), ini = toMin(c.hi), fin = toMin(c.hf);
  if (ma < ini - MARGEN_MIN) return 'proxima';
  if (ma > fin + MARGEN_MIN) return 'pasada';
  return 'activa';
}

function renderCronograma() {
  const d = ahora.getDay();
  const clasesHoy = CLASES.filter(c => c.dias.includes(d));
  let html = '<div class="no-clase-header"><h2>Sin clase activa ahora</h2><p>Clases de hoy:</p></div>';
  if (clasesHoy.length) {
    clasesHoy.forEach(function(c) {
      const est = estadoClase(c);
      const fis = c.fisico ? '<div class="fisico-tag">Fisico ' + c.hi + ' a ' + c.hf_fisico + '</div>' : '';
      html += '<div class="clase-hoy-item"><div class="clase-dot ' + est + '"></div><div class="clase-hoy-info"><div class="clase-hoy-nombre">' + c.nombre + '</div><div class="clase-hoy-sub">' + c.profe + fis + '</div></div><div class="clase-hoy-hora">' + c.hi + ' a ' + c.hf + '</div></div>';
    });
  } else {
    html += '<div style="text-align:center;padding:1.5rem 0;color:var(--gray-500);font-size:14px">No hay clases BJJ hoy</div>';
  }
  html += '<div class="sec-label" style="margin-top:1.5rem">Cronograma semanal</div><div class="semana-grid">';
  [1,2,3,4,5,6].forEach(function(dia) {
    const cs = CLASES.filter(c => c.dias.includes(dia));
    html += '<div class="semana-dia"><div class="semana-dia-nom">' + DIAS_NOMBRE[dia] + '</div>';
    if (cs.length) {
      cs.forEach(function(c) { html += '<div class="semana-clase"><span class="sh">' + c.hi + '</span> ' + c.turno + '</div>'; });
    } else {
      html += '<div class="semana-clase" style="color:var(--gray-500)">Sin clase</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderDNIInput() {
  const fisBadge = claseActiva.fisico ? '<div class="fisico-badge">Fisico hasta ' + claseActiva.hf_fisico + '</div>' : '';
  return '<div class="clase-activa-banner"><div class="banner-dot"></div><div class="banner-info"><div class="banner-nombre">' + claseActiva.nombre + '</div><div class="banner-sub">' + claseActiva.profe + ' ' + fisBadge + '</div></div><div class="banner-hora">' + claseActiva.hi + ' a ' + claseActiva.hf + '</div></div>' +
    '<h2>Bienvenido!</h2><p class="subtitle">Ingresa tu DNI para registrar asistencia</p>' +
    '<div class="ya-registro" id="ya-registro">Ya registraste tu asistencia en esta clase hoy.</div>' +
    '<div class="error-msg" id="error-msg"></div>' +
    '<div class="dni-wrap"><input type="number" id="dni-input" class="dni-input" placeholder="12345678" inputmode="numeric" onkeydown="if(event.key==='Enter')buscarDNI()" /><button class="btn-buscar" onclick="buscarDNI()">Buscar</button></div>' +
    '<p class="dni-hint">Si es tu primera vez te vamos a pedir que completes tu ficha</p>';
}

async function init() {
  claseActiva = detectarClase();
  const cp = document.getElementById('contenido-principal');
  if (!claseActiva) { cp.innerHTML = renderCronograma(); return; }
  cp.innerHTML = renderDNIInput();
  try {
    const res = await sb.from('config_turnos').select('tolerancia_min')
      .eq('dia', DIAS_COMPLETO[ahora.getDay()]).eq('horario', claseActiva.hi + ' - ' + claseActiva.hf).maybeSingle();
    if (res.data) toleranciaMin = res.data.tolerancia_min;
  } catch(e) { console.log('config error', e); }
  const diff = minAhora() - toMin(claseActiva.hi);
  minutosTarde = diff;
  esTarde = diff > toleranciaMin;
}

async function buscarDNI() {
  const raw = document.getElementById('dni-input').value;
  const dni = normDNI(raw);
  if (dni.length < 6) { mostrarError('Ingresa un DNI valido'); return; }
  ocultarError();
  const btn = document.querySelector('.btn-buscar');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const res = await sb.from('alumnos').select('*').eq('dni', dni).eq('activo', true).maybeSingle();
    const alumno = res.data;
    if (alumno) {
      const yaRes = await sb.from('asistencia').select('id').eq('alumno_id', alumno.id).eq('fecha', fechaHoy()).eq('turno', claseActiva.turno).maybeSingle();
      if (yaRes.data) {
        document.getElementById('ya-registro').style.display = 'block';
        btn.textContent = 'Buscar'; btn.disabled = false;
        return;
      }
      const faltaDatos = !alumno.nombre || !alumno.apellido || !alumno.fecha_nac || !alumno.sexo;
      alumnoActual = alumno;
      if (faltaDatos) { renderCompletarFicha(alumno); } else { renderConfirmarAlumno(alumno); }
    } else {
      renderRegistroNuevo(dni);
    }
  } catch(e) {
    console.error('buscarDNI error', e);
    mostrarError('Error al buscar. Intenta de nuevo.');
  }
  btn.textContent = 'Buscar'; btn.disabled = false;
}

function renderConfirmarAlumno(a) {
  const ini = ((a.nombre || '') + ' ' + (a.apellido || '')).trim().split(' ').map(function(w) { return w[0]; }).join('').slice(0,2).toUpperCase();
  const belt = a.cinturon || 'blanco';
  const BELT_COLORS = {blanco:'#e0e0e0',azul:'#2980b9',violeta:'#8e44ad',marron:'#7f5539',negro:'#1a1a1a'};
  const bc = BELT_COLORS[belt] || '#e0e0e0';
  const tardeWarn = esTarde ? '<div style="background:#fff5e6;border-radius:8px;padding:8px 12px;font-size:13px;color:#854F0B;margin-bottom:12px">Llegaste +' + minutosTarde + ' min tarde</div>' : '';
  const btnClass = esTarde ? 'btn-primary orange' : 'btn-primary';
  document.getElementById('contenido-principal').innerHTML =
    '<div class="alumno-confirm-card"><div class="alumno-avatar">' + ini + '</div><div><div class="alumno-confirm-name">' + (a.nombre||'') + ' ' + (a.apellido||'') + '</div><div class="alumno-confirm-sub"><span style="display:inline-block;width:30px;height:10px;background:' + bc + ';border-radius:2px;vertical-align:middle;margin-right:4px"></span>' + belt + (a.stripes ? ' ' + a.stripes + ' stripes' : '') + '</div></div></div>' +
    tardeWarn +
    '<button class="' + btnClass + '" onclick="confirmarAsistencia()">Confirmar asistencia</button>' +
    '<button class="btn-secondary" onclick="init()">No soy yo</button>';
}

function renderCompletarFicha(a) {
  const faltaNombre = !a.nombre || !a.apellido;
  const faltaFecha  = !a.fecha_nac;
  const faltaSexo   = !a.sexo;
  let html = '<h2>Completa tu ficha</h2><p class="subtitle">Faltan algunos datos obligatorios</p>';
  html += '<div class="error-msg" id="error-ficha"></div>';
  if (faltaNombre) {
    html += '<div class="form-row"><div class="form-field"><label class="form-label">Nombre *</label><input type="text" class="form-input" id="fi-nombre" placeholder="Matias" value="' + (a.nombre||'') + '" /></div><div class="form-field"><label class="form-label">Apellido *</label><input type="text" class="form-input" id="fi-apellido" placeholder="Garcia" value="' + (a.apellido||'') + '" /></div></div>';
  }
  if (faltaFecha) {
    html += '<div class="form-field"><label class="form-label">Fecha de nacimiento *</label><input type="date" class="form-input" id="fi-fecha" /></div>';
  }
  if (faltaSexo) {
    html += '<div class="form-field"><label class="form-label">Sexo *</label><div class="sexo-opts"><button class="sexo-btn" onclick="selSexo(this,'masculino')">Masculino</button><button class="sexo-btn" onclick="selSexo(this,'femenino')">Femenino</button><button class="sexo-btn" onclick="selSexo(this,'otro')">Otro</button></div></div>';
  }
  html += '<button class="btn-primary" onclick="guardarFicha()">Guardar y continuar</button>';
  document.getElementById('contenido-principal').innerHTML = html;
}

async function guardarFicha() {
  const updates = {};
  const nombreEl   = document.getElementById('fi-nombre');
  const apellidoEl = document.getElementById('fi-apellido');
  const fechaEl    = document.getElementById('fi-fecha');
  if (nombreEl) {
    if (!nombreEl.value.trim() || !apellidoEl.value.trim()) { mostrarErrorFicha('Nombre y apellido son obligatorios'); return; }
    updates.nombre   = nombreEl.value.trim();
    updates.apellido = apellidoEl.value.trim();
  }
  if (fechaEl) {
    if (!fechaEl.value) { mostrarErrorFicha('La fecha de nacimiento es obligatoria'); return; }
    updates.fecha_nac = fechaEl.value;
  }
  if (!alumnoActual.sexo && !sexoSeleccionado) { mostrarErrorFicha('Selecciona el sexo'); return; }
  if (sexoSeleccionado) updates.sexo = sexoSeleccionado;
  const res = await sb.from('alumnos').update(updates).eq('id', alumnoActual.id);
  if (res.error) { mostrarErrorFicha('Error al guardar. Intenta de nuevo.'); return; }
  alumnoActual = Object.assign({}, alumnoActual, updates);
  renderConfirmarAlumno(alumnoActual);
}

function renderRegistroNuevo(dni) {
  sexoSeleccionado = null;
  document.getElementById('contenido-principal').innerHTML =
    '<h2>Registrate</h2><p class="subtitle">Primera vez en el sistema. DNI: ' + dni + '</p>' +
    '<div class="error-msg" id="error-reg"></div>' +
    '<div class="form-row"><div class="form-field"><label class="form-label">Nombre *</label><input type="text" class="form-input" id="reg-nombre" placeholder="Matias" /></div><div class="form-field"><label class="form-label">Apellido *</label><input type="text" class="form-input" id="reg-apellido" placeholder="Garcia" /></div></div>' +
    '<div class="form-field"><label class="form-label">Fecha de nacimiento *</label><input type="date" class="form-input" id="reg-fecha" /></div>' +
    '<div class="form-field"><label class="form-label">Sexo *</label><div class="sexo-opts"><button class="sexo-btn" onclick="selSexo(this,'masculino')">Masculino</button><button class="sexo-btn" onclick="selSexo(this,'femenino')">Femenino</button><button class="sexo-btn" onclick="selSexo(this,'otro')">Otro</button></div></div>' +
    '<button class="btn-primary" onclick="registrarNuevo('' + dni + '')">Registrarme y marcar asistencia</button>' +
    '<button class="btn-secondary" onclick="init()">Atras</button>';
}

async function registrarNuevo(dni) {
  const nombre   = document.getElementById('reg-nombre').value.trim();
  const apellido = document.getElementById('reg-apellido').value.trim();
  const fecha    = document.getElementById('reg-fecha').value;
  if (!nombre || !apellido) { mostrarErrorReg('Nombre y apellido son obligatorios'); return; }
  if (!fecha)               { mostrarErrorReg('La fecha de nacimiento es obligatoria'); return; }
  if (!sexoSeleccionado)    { mostrarErrorReg('Selecciona el sexo'); return; }
  const res = await sb.from('alumnos').insert({
    nombre: nombre, apellido: apellido, dni: normDNI(dni),
    fecha_nac: fecha, sexo: sexoSeleccionado,
    cinturon: 'blanco', stripes: 0, activo: true, estado: 'activo'
  }).select().single();
  if (res.error) {
    if (res.error.code === '23505') mostrarErrorReg('Ese DNI ya esta registrado.');
    else mostrarErrorReg('Error al registrar. Intenta de nuevo.');
    return;
  }
  alumnoActual = res.data;
  renderConfirmarAlumno(res.data);
}

async function confirmarAsistencia() {
  if (!alumnoActual || !claseActiva) return;
  if (esTarde) {
    document.getElementById('main-card').classList.add('hide');
    document.getElementById('tarde-screen').classList.add('show');
    document.getElementById('tarde-nombre-sub').textContent = (alumnoActual.nombre||'') + ' ' + (alumnoActual.apellido||'');
    document.getElementById('tarde-minutos').textContent = '+' + minutosTarde + ' min sobre el horario';
  } else {
    await registrar(false, null);
  }
}

function selMotivo(el, motivo) {
  motivoSeleccionado = motivo === 'otro' ? null : motivo;
  document.querySelectorAll('.motivo-item').forEach(function(m) { m.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('otro-texto').classList.toggle('visible', motivo === 'otro');
  document.getElementById('btn-tarde').style.display = 'block';
}

async function confirmarTarde() {
  let motivo = motivoSeleccionado;
  if (!motivo) {
    const txt = document.getElementById('otro-texto').value.trim();
    if (!txt) { alert('Escribi el motivo'); return; }
    motivo = txt;
  }
  await registrar(true, motivo);
}

async function registrar(tarde, motivo) {
  const ma = minAhora();
  const conFisico = claseActiva.fisico ? ma <= toMin(claseActiva.hf_fisico) : null;
  const horaStr = ahora.getHours().toString().padStart(2,'0') + ':' + ahora.getMinutes().toString().padStart(2,'0');
  try {
    const res = await sb.from('asistencia').insert({
      alumno_id    : alumnoActual.id,
      nombre       : alumnoActual.nombre,
      apellido     : alumnoActual.apellido,
      fecha        : fechaHoy(),
      turno        : claseActiva.turno,
      horario      : claseActiva.hi + ' - ' + claseActiva.hf,
      tarde        : tarde,
      motivo_tarde : motivo,
      con_fisico   : conFisico,
      timestamp    : ahora.toISOString()
    });
    if (res.error) throw res.error;
    mostrarSuccess(tarde, motivo, conFisico, horaStr);
  } catch(e) {
    console.error('registrar error', e);
    alert('Error al registrar. Intenta de nuevo.');
  }
}

function mostrarSuccess(tarde, motivo, conFisico, hora) {
  document.getElementById('main-card').classList.add('hide');
  document.getElementById('tarde-screen').classList.add('hide');
  const ss = document.getElementById('success-screen');
  ss.classList.add('show');
  const circle = document.getElementById('success-circle');
  circle.className = 'success-circle ' + (tarde ? 'orange' : 'green');
  circle.querySelector('svg').style.color = tarde ? '#e67e22' : '#27ae60';
  document.getElementById('success-title').textContent = tarde ? 'Asistencia registrada' : 'Asistencia registrada!';
  document.getElementById('success-nombre').textContent = (alumnoActual.nombre||'') + ' ' + (alumnoActual.apellido||'');
  document.getElementById('success-clase').textContent = claseActiva.nombre + ' ' + hora;
  const tardeMsg = document.getElementById('success-tarde-msg');
  tardeMsg.textContent = tarde ? 'Tardanza: ' + motivo : '';
  tardeMsg.style.display = tarde ? 'block' : 'none';
  document.getElementById('success-fisico').style.display = conFisico ? 'block' : 'none';
}

function volver() {
  alumnoActual = null; motivoSeleccionado = null; sexoSeleccionado = null; esTarde = false; minutosTarde = 0;
  document.getElementById('main-card').classList.remove('hide');
  document.getElementById('tarde-screen').classList.remove('show');
  document.getElementById('tarde-screen').classList.remove('hide');
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('btn-tarde').style.display = 'none';
  document.getElementById('otro-texto').classList.remove('visible');
  document.querySelectorAll('.motivo-item').forEach(function(m) { m.classList.remove('selected'); });
  init();
}

function selSexo(el, val) {
  sexoSeleccionado = val;
  document.querySelectorAll('.sexo-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
}

function mostrarError(msg)      { const e = document.getElementById('error-msg');   if(e) { e.textContent = msg; e.style.display = 'block'; } }
function ocultarError()         { const e = document.getElementById('error-msg');   if(e) e.style.display = 'none'; }
function mostrarErrorFicha(msg) { const e = document.getElementById('error-ficha'); if(e) { e.textContent = msg; e.style.display = 'block'; } }
function mostrarErrorReg(msg)   { const e = document.getElementById('error-reg');   if(e) { e.textContent = msg; e.style.display = 'block'; } }

init();
if(typeof KAIZO_LOGO !== "undefined") { var el = document.getElementById("kaizo-logo"); if(el) el.src = KAIZO_LOGO; }
</script>
