<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#d61f26">
<link rel="manifest" href="/manifest.json">
<title>Kaizo BJJ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#d61f26;--red-dark:#a01419;--red-light:#fdecec;--red-glow:rgba(214,31,38,.35);--ink:#0d0d0d;--ink-2:#171717;--silver-1:#f5f5f7;--silver-2:#cfd2d6;--silver-3:#8b8f96;--black:#111;--white:#fff;--g6:#666;--g5:#8a8d92;--g2:#e9e9ec;--g1:#f5f5f7;--green:#27ae60;--orange:#e67e22;--r:16px;--rs:10px;--shadow:0 12px 34px rgba(0,0,0,.10)}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--ink);color:var(--white);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.hdr{position:relative;padding:1.1rem 1.25rem .9rem;display:flex;align-items:center;gap:13px;background:radial-gradient(130% 150% at 0% 0%,#1f1f1f 0%,var(--ink) 62%);border-bottom:1px solid rgba(255,255,255,.06)}
.logo{width:50px;height:50px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--red);box-shadow:0 0 0 3px rgba(214,31,38,.16),0 4px 12px rgba(0,0,0,.55)}
.hdr h1{font-family:'Oswald',sans-serif;font-size:23px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;line-height:1;background:linear-gradient(180deg,#fff 0%,#cfd2d6 48%,#9aa0a6 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:10px;color:var(--silver-3);margin-top:4px;letter-spacing:.16em;text-transform:uppercase}
.clock{margin-left:auto;text-align:right}
.clock .hr{font-family:'Oswald',sans-serif;font-size:21px;font-weight:600;color:#fff}
.clock .dy{font-size:10.5px;color:var(--silver-3);text-transform:capitalize}
.card{background:var(--white);border-radius:22px 22px 0 0;padding:1.6rem 1.25rem 2rem;flex:1;color:var(--black);box-shadow:0 -6px 24px rgba(0,0,0,.20)}
/* CRONOGRAMA */
.noc-hdr{text-align:center;padding:1rem 0 1.25rem}
.noc-hdr h2{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
.noc-hdr p{font-size:14px;color:var(--g5)}
.slbl{font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.chi{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--g1);border:1px solid var(--g2);border-radius:var(--rs);margin-bottom:8px;transition:transform .15s,box-shadow .15s}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cdot.activa{background:var(--red)}.cdot.proxima{background:var(--orange)}.cdot.pasada{background:var(--g2)}
.chi-info{flex:1}
.chi-nom{font-size:14px;font-weight:600}
.chi-sub{font-size:12px;color:var(--g5);margin-top:1px}
.chi-hr{font-size:13px;font-weight:600;color:var(--g6)}
.ftag{font-size:11px;color:var(--orange);margin-top:2px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.sdia{background:var(--g1);border-radius:var(--rs);padding:10px 8px}
.sdia-n{font-size:11px;font-weight:700;color:var(--g5);margin-bottom:6px;text-transform:uppercase}
.scl{font-size:11px;color:var(--black);line-height:1.4;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--g2)}
.scl:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.scl .sh{font-weight:700;color:var(--red)}
/* BANNER */
.bnr{background:linear-gradient(135deg,#e2262d 0%,#a01419 100%);border-radius:var(--rs);padding:13px 16px;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px;box-shadow:0 8px 22px var(--red-glow)}
.bdot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.binfo{flex:1}
.bnom{font-size:14px;font-weight:700;color:#fff}
.bsub{font-size:12px;color:rgba(255,255,255,.75);margin-top:1px}
.bhr{font-size:13px;color:rgba(255,255,255,.9);font-weight:600}
.fbdg{background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;margin-top:4px;display:inline-block}
/* OPCIONES MULTIPLES CLASE */
.clase-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.clase-opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--g2);border-radius:var(--rs);cursor:pointer;transition:all .15s}
.clase-opt:hover{border-color:var(--red);background:var(--red-light)}
.clase-opt.on{border-color:var(--red);background:var(--red-light)}
.clase-opt-info{flex:1}
.clase-opt-nom{font-size:14px;font-weight:600}
.clase-opt-sub{font-size:12px;color:var(--g5)}
.clase-opt-chk{color:var(--red);display:none}
.clase-opt.on .clase-opt-chk{display:block}
/* DNI */
.card h2{font-family:'Oswald',sans-serif;font-size:23px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px}
.sub{font-size:14px;color:var(--g5);margin-bottom:1.25rem}
.dniw{display:flex;gap:8px;margin-bottom:1rem}
.dnii{flex:1;padding:14px 16px;border:2px solid var(--g2);border-radius:var(--rs);font-size:20px;font-weight:700;color:var(--black);background:var(--g1);outline:none;letter-spacing:2px;text-align:center;transition:border-color .2s,box-shadow .2s}
.dnii:focus{border-color:var(--red);background:var(--white);box-shadow:0 0 0 4px rgba(214,31,38,.12)}
.bbsc{padding:14px 22px;background:linear-gradient(180deg,#e2262d,#bb171d);color:var(--white);border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px var(--red-glow);transition:transform .12s,box-shadow .12s}
.bbsc:hover{box-shadow:0 8px 22px var(--red-glow)}.bbsc:active{transform:translateY(1px)}
.dhnt{font-size:12px;color:var(--g5);text-align:center;margin-bottom:1rem}
.btn-ficha{width:100%;padding:12px;background:transparent;color:var(--red);border:1.5px solid var(--red);border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.btn-ficha:hover{background:var(--red-light)}
/* CONFIRM ALUMNO */
.acard{background:var(--g1);border-radius:var(--rs);padding:16px;margin-bottom:1rem;display:flex;align-items:center;gap:14px}
.aav{width:48px;height:48px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--red);flex-shrink:0;overflow:hidden}
.aav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.aname{font-size:17px;font-weight:700}
.asub{font-size:13px;color:var(--g5);margin-top:2px}
/* FORM */
.ff{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#444;margin-bottom:5px;display:block}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:var(--rs);font-size:15px;color:var(--black);background:var(--g1);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--red);background:var(--white);box-shadow:0 0 0 4px rgba(214,31,38,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sxo{display:flex;gap:8px}
.sxb{flex:1;padding:10px;border:1.5px solid var(--g2);border-radius:var(--rs);font-size:13px;font-weight:500;background:var(--g1);color:#444;cursor:pointer;text-align:center;transition:all .15s}
.sxb.on{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:700}
.emsg{background:var(--red-light);border:1px solid #f09595;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px;display:none}
.yareg{background:#fff8e6;border:1.5px solid #f0c040;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:#856404;margin-bottom:12px;text-align:center;display:none}
.bok{width:100%;padding:14px;background:linear-gradient(180deg,#e2262d,#bb171d);color:var(--white);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 6px 16px var(--red-glow);transition:transform .12s}
.bok:active{transform:translateY(1px)}
.bok.org{background:linear-gradient(180deg,#f08a30,#d96f12);box-shadow:0 6px 16px rgba(230,126,34,.32)}
.bsec{width:100%;padding:11px;background:transparent;color:var(--g6);border:1.5px solid var(--g2);border-radius:var(--rs);font-size:14px;cursor:pointer;margin-top:8px}
.ld{text-align:center;padding:2rem 0;color:var(--g5)}
.dot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin:0 2px;animation:bnc 1s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* TARDE */
.tscr{display:none;flex-direction:column;flex:1;background:var(--white);border-radius:var(--r) var(--r) 0 0;padding:1.5rem 1.25rem 2rem;color:var(--black)}
.tscr.show{display:flex}
.mlist{display:flex;flex-direction:column;gap:8px;margin:1rem 0}
.mi{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--g2);border-radius:var(--rs);cursor:pointer;transition:all .15s}
.mi:hover{border-color:var(--orange);background:#fff9f0}
.mi.on{border-color:var(--orange);background:#fff5e6}
.mchk{color:var(--orange);display:none}
.mi.on .mchk{display:block}
.otro{width:100%;padding:11px 12px;border:1.5px solid var(--g2);border-radius:var(--rs);font-size:14px;color:var(--black);background:var(--g1);outline:none;display:none;margin-top:6px}
.otro.show{display:block}
/* SUCCESS */
.oscr{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;text-align:center;background:var(--white);border-radius:var(--r) var(--r) 0 0;color:var(--black)}
.oscr.show{display:flex}
.hide{display:none!important}
.ocirc{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.ocirc.green{background:#e8f8ef}.ocirc.org{background:#fff5e6}
.oscr h2{font-size:22px;font-weight:700;margin-bottom:6px}
.osub{font-size:14px;color:var(--g5)}
.ocls{font-size:13px;color:var(--red);margin-top:6px;font-weight:600}
.otrd{font-size:13px;color:var(--orange);margin-top:4px;display:none}
.ofis{font-size:13px;color:var(--orange);margin-top:4px;display:none}
.bvlv{margin-top:2rem;padding:11px 28px;background:var(--g1);border:none;border-radius:var(--rs);font-size:14px;color:#444;cursor:pointer}
/* FICHA TABS */
.ftabs{display:flex;border-bottom:1px solid var(--g2);margin:-1.25rem -1.25rem 1.25rem}
.ftab{flex:1;padding:11px 4px;font-size:13px;font-weight:600;color:var(--g5);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:color .15s}
.ftab.on{color:var(--red);border-bottom-color:var(--red)}
.ftab-panel{display:none}
.ftab-panel.on{display:block}
/* FICHA */
.ficha-scr{display:none;flex-direction:column;flex:1;background:var(--white);border-radius:var(--r) var(--r) 0 0;color:var(--black);overflow-y:auto}
.ficha-scr.show{display:flex}
.ficha-hdr{background:radial-gradient(130% 150% at 0% 0%,#1f1f1f 0%,var(--ink) 65%);padding:1.4rem 1.25rem;display:flex;align-items:center;gap:14px}
.ficha-av{width:64px;height:64px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--red);flex-shrink:0;overflow:hidden;cursor:pointer;border:2px solid var(--red)}
.ficha-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ficha-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:#fff}
.ficha-belt{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px}
.ficha-body{padding:1.25rem;flex:1}
.fsec{margin-bottom:1.5rem}
.fsec-title{font-size:12px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--g2)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fitem{margin-bottom:10px}
.fitem label{font-size:12px;color:var(--g5);display:block;margin-bottom:3px}
.fitem input,.fitem select{width:100%;padding:9px 12px;border:1.5px solid var(--g2);border-radius:var(--rs);font-size:14px;color:var(--black);background:var(--g1);outline:none}
.fitem input:focus,.fitem select:focus{border-color:var(--red);background:var(--white);box-shadow:0 0 0 4px rgba(214,31,38,.1)}
.ftag-read{font-size:14px;color:var(--black);padding:9px 0}
.belt-vis{display:flex;align-items:center;gap:8px;padding:9px 0}
.belt-bar{height:14px;border-radius:3px}
.chk-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.chk-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--red);cursor:pointer}
.chk-row label{font-size:14px;color:var(--black);cursor:pointer}
.btn-guardar-ficha{width:100%;padding:13px;background:linear-gradient(180deg,#e2262d,#bb171d);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 6px 16px var(--red-glow);transition:transform .12s}
.btn-guardar-ficha:active{transform:translateY(1px)}
.btn-back-ficha{width:100%;padding:11px;background:transparent;color:var(--g6);border:1.5px solid var(--g2);border-radius:var(--rs);font-size:14px;cursor:pointer;margin-top:8px}
.foto-input{display:none}
.ficha-foto-hint{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
/* TORNEO DESDE ALUMNO */
.torneo-item{background:var(--g1);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.torneo-nom{font-size:14px;font-weight:600}
.torneo-sub{font-size:12px;color:var(--g5);margin-top:2px}
.puesto-badge{display:inline-block;font-size:12px;font-weight:700;padding:2px 10px;border-radius:99px;margin-top:4px}
.puesto-1{background:#fff8dc;color:#856404}
.puesto-2{background:#f0f0f0;color:#444}
.puesto-3{background:#fff0e6;color:#7d3c00}
.btn-add-torneo{width:100%;padding:11px;background:transparent;color:var(--red);border:1.5px solid var(--red);border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
/* MODAL TORNEO */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:var(--r);padding:1.5rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h3{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;margin-bottom:1rem;color:var(--black)}
.mfield{margin-bottom:12px}
.mfield label{font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:4px}
.mfield input,.mfield select{width:100%;padding:9px 12px;border:1.5px solid var(--g2);border-radius:var(--rs);font-size:14px;color:var(--black);background:var(--g1);outline:none}
.mbts{display:flex;gap:8px;margin-top:1rem}
.mbts button{flex:1;padding:10px;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer}
.mbts .bconf{background:linear-gradient(180deg,#e2262d,#bb171d);color:#fff;box-shadow:0 4px 12px var(--red-glow)}
.mbts .bcanc{background:var(--g1);color:#444}
@media(min-width:600px){body{background:radial-gradient(120% 80% at 50% 0%,#1c1c1c 0%,#0a0a0a 70%);align-items:center}.hdr{max-width:480px;width:100%;border-radius:var(--r) var(--r) 0 0;margin-top:2rem;border-bottom:none}.card,.tscr,.oscr,.ficha-scr{max-width:480px;width:100%;border-radius:0 0 var(--r) var(--r);flex:none;box-shadow:var(--shadow)}.card{border-radius:0 0 var(--r) var(--r)}}
</style>
</head>
<body>
<div class="hdr">
  <img id="logo" class="logo" alt="Kaizo BJJ" />
  <div><h1>Kaizo BJJ</h1><p>Brazilian Jiu-Jitsu - Mataderos</p></div>
  <div class="clock"><div class="hr" id="hr">--:--</div><div class="dy" id="dy">--</div></div>
</div>

<div class="card" id="mc">
  <div id="cp"><div class="ld"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
</div>

<div class="tscr" id="ts">
  <div style="margin-bottom:1.25rem"><h2 style="font-size:19px;font-weight:700;margin-bottom:4px">Llegada tarde</h2><p style="font-size:14px;color:var(--g5)" id="tns"></p></div>
  <div style="display:inline-block;background:#fff5e6;color:#854F0B;font-size:13px;font-weight:600;padding:4px 12px;border-radius:99px;margin-bottom:1rem" id="tmin"></div>
  <p style="font-size:14px;color:#444;margin-bottom:4px">Cual fue el motivo?</p>
  <div class="mlist">
    <div class="mi" data-motivo="Llegue tarde por trabajo"><span style="font-size:18px">&#128188;</span><span style="font-size:14px;font-weight:500;flex:1">Llegue tarde por trabajo</span><svg class="mchk" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
    <div class="mi" data-motivo="Problema de transporte"><span style="font-size:18px">&#128652;</span><span style="font-size:14px;font-weight:500;flex:1">Problema de transporte</span><svg class="mchk" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
    <div class="mi" data-motivo="Motivo personal"><span style="font-size:18px">&#128591;</span><span style="font-size:14px;font-weight:500;flex:1">Motivo personal</span><svg class="mchk" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
    <div class="mi" data-motivo="otro"><span style="font-size:18px">&#9999;</span><span style="font-size:14px;font-weight:500;flex:1">Otro</span><svg class="mchk" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
  </div>
  <input type="text" id="otro" class="otro" placeholder="Contanos brevemente..." />
  <div id="err-tarde" style="background:var(--red-light);border:1px solid #f09595;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:8px;display:none"></div>
  <button class="bok org" id="btn-tarde" style="display:none">Registrar asistencia</button>
</div>

<div class="oscr" id="os">
  <div class="ocirc" id="oc"><svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
  <h2 id="ot">Asistencia registrada!</h2>
  <p class="osub" id="on"></p>
  <div id="odet" style="background:var(--g1);border-radius:var(--rs);padding:12px 16px;margin:.75rem 0 0;text-align:left;width:100%;display:none"></div>
  <p class="otrd" id="otm"></p>
  <p class="ofis" id="ofi">Con fisico registrado</p>
  <button class="bvlv" id="bvlv">Volver</button>
</div>

<div class="ficha-scr" id="fs">
  <div class="ficha-hdr">
    <div class="ficha-av" id="fav" title="Tocar para cambiar foto">
      <span id="fav-ini"></span>
    </div>
    <input type="file" id="foto-inp" class="foto-input" accept="image/*" />
    <div>
      <div class="ficha-name" id="f-name"></div>
      <div class="ficha-belt" id="f-belt"></div>
      <div class="ficha-foto-hint">Toca la foto para cambiarla</div>
    </div>
  </div>
  <div class="ficha-body" id="ficha-body"></div>
</div>

<div class="modal-bg" id="modal-torneo">
  <div class="modal">
    <h3>Registrar participacion en torneo</h3>
    <div class="mfield"><label>Torneo</label><select id="mt-torneo"></select></div>
    <div class="mfield"><label>Modalidad</label>
      <select id="mt-mod"><option value="Gi">Gi</option><option value="NoGi">NoGi</option></select>
    </div>
    <div class="mfield"><label>División / Categoría</label>
      <select id="mt-cat">
        <option value="">Sin especificar</option>
        <option value="Infantil">Infantil</option>
        <option value="Juvenil">Juvenil</option>
        <option value="Adulto">Adulto</option>
        <option value="Master 1">Master 1</option>
        <option value="Master 2">Master 2</option>
        <option value="Master 3+">Master 3+</option>
      </select>
    </div>
    <div class="mfield"><label>Peso (kg)</label><input type="number" id="mt-peso" placeholder="70" step="0.5" /></div>
    <div class="mfield"><label>Puesto obtenido</label>
      <select id="mt-puesto">
        <option value="">No clasifique / participé</option>
        <option value="1">1° puesto</option>
        <option value="2">2° puesto</option>
        <option value="3">3° puesto</option>
      </select>
    </div>
    <div class="mbts">
      <button class="bcanc" id="mt-cancel">Cancelar</button>
      <button class="bconf" id="mt-confirm">Guardar</button>
    </div>
  </div>
</div>

function normDNI(v) { return v.replace(/[^0-9]/g,''); }

async function cargarClases() {
  try {
    var r = await sb.from('config_clases').select('*').eq('activo',true);
    if(r.data && r.data.length) {
      var map = {};
      r.data.forEach(function(c) {
        var key = c.hora_inicio+'|'+c.hora_fin+'|'+c.turno_id;
        if(!map[key]) map[key] = {dias:[],hi:c.hora_inicio,hf:c.hora_fin,nom:c.nombre,pro:c.profe||'',tur:c.turno_id,fis:c.tiene_fisico,hff:c.hora_fisico};
        map[key].dias.push(c.dia);
      });
      CLASES = Object.values(map);
    }
  } catch(e) { console.error('Error cargando clases',e); }
}

function findClasesActivas() {
  var d=ahora.getDay(), ma=mNow();
  return CLASES.filter(function(c) {
    return c.dias.indexOf(d)>=0 && ma>=toM(c.hi)-MARGEN && ma<=toM(c.hf)+MARGEN;
  });
}

function estadoClase(c) {
  var ma=mNow(), ini=toM(c.hi), fin=toM(c.hf);
  if(ma<ini-MARGEN) return 'proxima';
  if(ma>fin+MARGEN) return 'pasada';
  return 'activa';
}

function mkCron() {
  var d=ahora.getDay();
  var ch=CLASES.filter(function(c){return c.dias.indexOf(d)>=0;});
  var h='<div class="noc-hdr"><h2>Sin clase activa ahora</h2><p>Clases de hoy:</p></div>';
  ch.forEach(function(c) {
    var e=estadoClase(c);
    var f=c.fis?'<div class="ftag">Fisico hasta '+c.hff+'</div>':'';
    h+='<div class="chi"><div class="cdot '+e+'"></div><div class="chi-info"><div class="chi-nom">'+c.nom+'</div><div class="chi-sub">'+c.pro+f+'</div></div><div class="chi-hr">'+c.hi+'-'+c.hf+'</div></div>';
  });
  if(!ch.length) h+='<div style="text-align:center;padding:1.5rem 0;color:var(--g5)">No hay clases BJJ hoy</div>';
  h+='<div class="slbl" style="margin-top:1.5rem">Cronograma semanal</div><div class="sgrid">';
  [1,2,3,4,5,6].forEach(function(dia) {
    var cs=CLASES.filter(function(c){return c.dias.indexOf(dia)>=0;});
    h+='<div class="sdia"><div class="sdia-n">'+DN[dia]+'</div>';
    if(cs.length) cs.forEach(function(c){h+='<div class="scl"><span class="sh">'+c.hi+'</span> '+c.tur+'</div>';});
    else h+='<div class="scl" style="color:var(--g5)">Sin clase</div>';
    h+='</div>';
  });
  return h+'</div>';
}

function mkDNI(clases) {
  var bnnrs = clases.map(function(c) {
    var f=c.fis?'<div class="fbdg">Fisico hasta '+c.hff+'</div>':'';
    return '<div class="bnr" style="margin-bottom:8px"><div class="bdot"></div><div class="binfo"><div class="bnom">'+c.nom+'</div><div class="bsub">'+c.pro+' '+f+'</div></div><div class="bhr">'+c.hi+'-'+c.hf+'</div></div>';
  }).join('');
  return bnnrs+
    '<h2>Bienvenido!</h2><p class="sub">Ingresa tu DNI para registrar asistencia</p>'+
    '<div class="yareg" id="yr">Ya registraste asistencia en esta clase hoy.</div>'+
    '<div class="emsg" id="em"></div>'+
    '<div class="dniw"><input type="number" id="di" class="dnii" placeholder="12345678" inputmode="numeric" /><button class="bbsc" id="bbs">Buscar</button></div>'+
    '<p class="dhnt">Si es tu primera vez te pediremos que completes tu ficha</p>'+
    '<div style="border-top:1px solid var(--g2);margin:1rem 0"></div>'+
    '<button class="btn-ficha" id="btn-ver-ficha">Ver / editar mi ficha</button>';
}

function bindDNI() {
  document.getElementById('di').addEventListener('keydown', function(e){ if(e.key==='Enter') buscarDNI(); });
  document.getElementById('bbs').onclick = buscarDNI;
  var bf = document.getElementById('btn-ver-ficha');
  if(bf) bf.onclick = function(){ mkFichaFlow(); };
}

async function init() {
  if(CLASES.length === 0) await cargarClases();
  clasesActivas = findClasesActivas();
  var cp = document.getElementById('cp');
  if(!clasesActivas.length) {
    cp.innerHTML = mkCron()+
      '<div style="padding:0 0 1.25rem">'+
      '<div style="border-top:1px solid var(--g2);margin-bottom:1.25rem"></div>'+
      '<button class="btn-ficha" id="btn-ver-ficha-cron">Ver / editar mi ficha</button>'+
      '</div>';
    var bfc=document.getElementById('btn-ver-ficha-cron');
    if(bfc) bfc.onclick=function(){ mkFichaFlow(); };
    return;
  }
  cp.innerHTML = mkDNI(clasesActivas);
  bindDNI();
  if(clasesActivas.length === 1) {
    claseSeleccionada = clasesActivas[0];
    var diff = mNow() - toM(claseSeleccionada.hi);
    minTarde = diff;
    try {
      var r = await sb.from('config_turnos').select('tolerancia_min').eq('dia',DL[ahora.getDay()]).eq('horario',claseSeleccionada.hi+' - '+claseSeleccionada.hf).maybeSingle();
      if(r.data) tolMin = r.data.tolerancia_min;
    } catch(e) {}
    esTarde = diff > tolMin;
  }
}

async function buscarDNI() {
  var raw = document.getElementById('di').value;
  var dni = normDNI(raw);
  if(dni.length < 6) { setErr('em','Ingresa un DNI valido'); return; }
  clrErr('em');
  var btn = document.getElementById('bbs');
  btn.textContent='...'; btn.disabled=true;
  try {
    var r = await sb.from('alumnos').select('*').eq('dni',dni).eq('activo',true).maybeSingle();
    if(r.data) {
      alu = r.data;
      if(clasesActivas.length > 1 && !claseSeleccionada) {
        mkSeleccionClase(r.data);
        btn.textContent='Buscar'; btn.disabled=false;
        return;
      }
      var ya = await sb.from('asistencia').select('id').eq('alumno_id',r.data.id).eq('fecha',dHoy()).eq('turno',claseSeleccionada.tur).maybeSingle();
      if(ya.data) { document.getElementById('yr').style.display='block'; btn.textContent='Buscar'; btn.disabled=false; return; }
      var falta = !r.data.nombre||!r.data.apellido||!r.data.fecha_nac||!r.data.sexo;
      if(falta) mkFichaCompleta(r.data); else mkConfirm(r.data);
    } else {
      mkNuevo(dni);
    }
  } catch(e) { console.error(e); setErr('em','Error al buscar. Intenta de nuevo.'); }
  btn.textContent='Buscar'; btn.disabled=false;
}

function mkSeleccionClase(a) {
  var ini = ((a.nombre||'')+' '+(a.apellido||'')).trim().split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  var h = '<div class="acard"><div class="aav">'+ini+'</div><div><div class="aname">'+(a.nombre||'')+' '+(a.apellido||'')+'</div><div class="asub">Selecciona la clase</div></div></div>';
  h += '<div class="clase-opts">';
  clasesActivas.forEach(function(c,i) {
    h += '<div class="clase-opt" data-idx="'+i+'"><div class="clase-opt-info"><div class="clase-opt-nom">'+c.nom+'</div><div class="clase-opt-sub">'+c.pro+' - '+c.hi+' a '+c.hf+'</div></div><svg class="clase-opt-chk" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>';
  });
  h += '</div><button class="bok" id="bcnf-clase" style="display:none">Confirmar asistencia</button>';
  document.getElementById('cp').innerHTML = h;
  document.querySelectorAll('.clase-opt').forEach(function(el) {
    el.onclick = function() {
      document.querySelectorAll('.clase-opt').forEach(function(x){x.classList.remove('on');});
      el.classList.add('on');
      var idx = parseInt(el.dataset.idx);
      claseSeleccionada = clasesActivas[idx];
      var diff = mNow() - toM(claseSeleccionada.hi);
      minTarde = diff; esTarde = diff > tolMin;
      var bc = document.getElementById('bcnf-clase');
      bc.style.display = 'block';
      bc.className = 'bok'+(esTarde?' org':'');
    };
  });
  document.getElementById('bcnf-clase').onclick = function() { mkConfirm(alu); };
}

function mkConfirm(a) {
  var ini=((a.nombre||'')+' '+(a.apellido||'')).trim().split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  var belt=a.cinturon||'blanco';
  var bc=BELT_COLORS[belt]||'#e0e0e0';
  var warn=esTarde?'<div style="background:#fff5e6;border-radius:8px;padding:8px 12px;font-size:13px;color:#854F0B;margin-bottom:12px">Llegaste +'+minTarde+' min tarde</div>':'';
  var avHTML = a.foto_url ? '<img src="'+a.foto_url+'" />' : ini;
  var hayClase = !!claseSeleccionada;
  document.getElementById('cp').innerHTML=
    '<div class="acard"><div class="aav">'+avHTML+'</div><div><div class="aname">'+(a.nombre||'')+' '+(a.apellido||'')+'</div><div class="asub"><span style="display:inline-block;width:24px;height:8px;background:'+bc+';border-radius:2px;vertical-align:middle;margin-right:4px"></span>'+belt+(a.stripes?' - '+a.stripes+' grados':'')+'</div></div></div>'+
    warn+
    (hayClase?'<button class="bok'+(esTarde?' org':'')+'" id="bcnf">Confirmar asistencia</button><button class="bsec" id="bni">No soy yo</button>':'')+
    '<button class="'+(hayClase?'btn-ficha':'bok')+'" id="bvf" style="margin-top:8px">Ver / editar mi ficha</button>';
  if(hayClase){
    document.getElementById('bcnf').onclick = confirmarAsistencia;
    document.getElementById('bni').onclick = init;
  }
  document.getElementById('bvf').onclick = function(){ mostrarFicha(a); };
}

function mkFichaCompleta(a) {
  sexoSel = a.sexo || null;
  var fN=!a.nombre||!a.apellido, fF=!a.fecha_nac, fS=!a.sexo;
  var h='<h2>Completa tu ficha</h2><p class="sub">Faltan algunos datos obligatorios</p>';
  h+='<div class="emsg" id="ef"></div>';
  if(fN) h+='<div class="frow"><div class="ff"><label class="fl">Nombre *</label><input type="text" class="fi" id="fn" placeholder="Matias" value="'+(a.nombre||'')+'" /></div><div class="ff"><label class="fl">Apellido *</label><input type="text" class="fi" id="fa" placeholder="Garcia" value="'+(a.apellido||'')+'" /></div></div>';
  if(fF) h+='<div class="ff"><label class="fl">Fecha de nacimiento *</label><input type="date" class="fi" id="ff" /></div>';
  if(fS) h+='<div class="ff"><label class="fl">Sexo *</label><div class="sxo"><button class="sxb" data-sx="masculino">Masculino</button><button class="sxb" data-sx="femenino">Femenino</button><button class="sxb" data-sx="otro">Otro</button></div></div>';
  h+='<button class="bok" id="bgf">Guardar y continuar</button>';
  document.getElementById('cp').innerHTML=h;
  document.querySelectorAll('.sxb').forEach(function(b){ b.onclick=function(){ selSexo(this,this.dataset.sx); }; });
  document.getElementById('bgf').onclick = guardarFichaCompleta;
}

async function guardarFichaCompleta() {
  var u={};
  var fn=document.getElementById('fn'), fa=document.getElementById('fa'), ff=document.getElementById('ff');
  if(fn){ if(!fn.value.trim()||!fa.value.trim()){setErr('ef','Nombre y apellido son obligatorios');return;} u.nombre=fn.value.trim(); u.apellido=fa.value.trim(); }
  if(ff){ if(!ff.value){setErr('ef','La fecha de nacimiento es obligatoria');return;} u.fecha_nac=ff.value; }
  if(!alu.sexo&&!sexoSel){setErr('ef','Selecciona el sexo');return;}
  if(sexoSel) u.sexo=sexoSel;
  var r=await sb.from('alumnos').update(u).eq('id',alu.id);
  if(r.error){setErr('ef','Error al guardar');return;}
  alu=Object.assign({},alu,u);
  mkConfirm(alu);
}

function mkNuevo(dni) {
  sexoSel=null;
  var h='<h2>Registrate</h2><p class="sub">Primera vez. DNI: '+dni+'</p>';
  h+='<div class="emsg" id="er"></div>';
  h+='<div class="frow"><div class="ff"><label class="fl">Nombre *</label><input type="text" class="fi" id="rn" placeholder="Matias" /></div><div class="ff"><label class="fl">Apellido *</label><input type="text" class="fi" id="ra" placeholder="Garcia" /></div></div>';
  h+='<div class="ff"><label class="fl">Fecha de nacimiento *</label><input type="date" class="fi" id="rf" /></div>';
  h+='<div class="ff"><label class="fl">Sexo *</label><div class="sxo"><button class="sxb" data-sx="masculino">Masculino</button><button class="sxb" data-sx="femenino">Femenino</button><button class="sxb" data-sx="otro">Otro</button></div></div>';
  h+='<button class="bok" id="brn">Registrarme y marcar asistencia</button>';
  h+='<button class="bsec" id="bat">Atras</button>';
  document.getElementById('cp').innerHTML=h;
  document.querySelectorAll('.sxb').forEach(function(b){ b.onclick=function(){ selSexo(this,this.dataset.sx); }; });
  document.getElementById('brn').onclick = function(){ regNuevo(dni); };
  document.getElementById('bat').onclick = init;
}

async function regNuevo(dni) {
  var n=document.getElementById('rn').value.trim(), a=document.getElementById('ra').value.trim(), f=document.getElementById('rf').value;
  if(!n||!a){setErr('er','Nombre y apellido son obligatorios');return;}
  if(!f){setErr('er','La fecha de nacimiento es obligatoria');return;}
  if(!sexoSel){setErr('er','Selecciona el sexo');return;}
  var r=await sb.from('alumnos').insert({nombre:n,apellido:a,dni:normDNI(dni),fecha_nac:f,sexo:sexoSel,cinturon:'blanco',stripes:0,activo:true,estado:'activo'}).select().single();
  if(r.error){if(r.error.code==='23505')setErr('er','Ese DNI ya esta registrado.');else setErr('er','Error al registrar.');return;}
  alu=r.data;
  mkConfirm(r.data);
}

async function confirmarAsistencia() {
  if(!alu||!claseSeleccionada) return;
  var btn=document.getElementById('bcnf'); if(btn){btn.disabled=true;btn.textContent='Registrando...';}
  if(esTarde) {
    document.getElementById('mc').classList.add('hide');
    document.getElementById('ts').classList.add('show');
    document.getElementById('tns').textContent=(alu.nombre||'')+' '+(alu.apellido||'');
    document.getElementById('tmin').textContent='+'+minTarde+' min sobre el horario';
  } else { await registrar(false,null); }
}

document.querySelectorAll('.mi').forEach(function(el) {
  el.onclick = function() { selMotivo(this, this.dataset.motivo); };
});
document.getElementById('btn-tarde').onclick = confirmarTarde;
document.getElementById('bvlv').onclick = volver;

function selMotivo(el,v) {
  motivoSel=v==='otro'?null:v;
  document.querySelectorAll('.mi').forEach(function(m){m.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('otro').classList.toggle('show',v==='otro');
  document.getElementById('btn-tarde').style.display='block';
}

async function confirmarTarde() {
  var m=motivoSel;
  if(!m){var t=document.getElementById('otro').value.trim();if(!t){var e=document.getElementById('err-tarde');if(e){e.textContent='Escribi el motivo para continuar';e.style.display='block';}return;}m=t;}
  var e=document.getElementById('err-tarde');if(e)e.style.display='none';
  await registrar(true,m);
}

async function registrar(est,mot) {
  var ma=mNow();
  var cf=claseSeleccionada.fis?ma<=toM(claseSeleccionada.hff):null;
  var hs=pad(ahora.getHours())+':'+pad(ahora.getMinutes());
  try {
    var r=await sb.from('asistencia').insert({alumno_id:alu.id,nombre:alu.nombre,apellido:alu.apellido,fecha:dHoy(),turno:claseSeleccionada.tur,horario:claseSeleccionada.hi+' - '+claseSeleccionada.hf,tarde:est,motivo_tarde:mot,con_fisico:cf,timestamp:ahora.toISOString()});
    if(r.error) throw r.error;
    mostrarOk(est,mot,cf,hs);
  } catch(e) { console.error(e); var btn2=document.getElementById('bcnf'); if(btn2){btn2.disabled=false;btn2.textContent='Confirmar asistencia';} alert('Error al registrar. Intenta de nuevo.'); }
}

function mostrarOk(est,mot,cf,hs) {
  document.getElementById('mc').classList.add('hide');
  document.getElementById('ts').classList.add('hide');
  document.getElementById('os').classList.add('show');
  var oc=document.getElementById('oc');
  oc.className='ocirc '+(est?'org':'green');
  oc.querySelector('svg').style.color=est?'#e67e22':'#27ae60';
  document.getElementById('ot').textContent=est?'Asistencia registrada':'Asistencia registrada!';
  document.getElementById('on').textContent=(alu.nombre||'')+' '+(alu.apellido||'');
  var det=document.getElementById('odet');
  det.style.display='block';
  det.innerHTML=
    '<div style="margin-bottom:8px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.05em">Clase</div>'+
      '<div style="font-size:14px;font-weight:600;margin-top:2px">'+(claseSeleccionada.nom||'')+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:16px">'+
      '<div><div style="font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.05em">Horario</div>'+
      '<div style="font-size:13px;font-weight:600;margin-top:2px">'+(claseSeleccionada.hi||'')+' - '+(claseSeleccionada.hf||'')+'</div></div>'+
      '<div><div style="font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.05em">Llegada</div>'+
      '<div style="font-size:13px;font-weight:600;margin-top:2px;color:'+(est?'var(--orange)':'var(--green)')+'">'+hs+(est?' (+'+minTarde+' min)':' ✓')+'</div></div>'+
    '</div>';
  var otm=document.getElementById('otm'); otm.textContent=est&&mot?'Motivo: '+mot:''; otm.style.display=(est&&mot)?'block':'none';
  document.getElementById('ofi').style.display=cf?'block':'none';
}

function volver() {
  alu=null;motivoSel=null;sexoSel=null;esTarde=false;minTarde=0;claseSeleccionada=null;
  var det=document.getElementById('odet'); if(det){det.style.display='none';det.innerHTML='';}
  document.getElementById('mc').classList.remove('hide');
  document.getElementById('ts').classList.remove('show');
  document.getElementById('ts').classList.remove('hide');
  document.getElementById('os').classList.remove('show');
  document.getElementById('fs').classList.remove('show');
  document.getElementById('btn-tarde').style.display='none';
  document.getElementById('otro').classList.remove('show');
  document.querySelectorAll('.mi').forEach(function(m){m.classList.remove('on');});
  init();
}

// ── FICHA ────────────────────────────────────────────────
function mkFichaFlow() {
  document.getElementById('cp').innerHTML =
    '<h2>Ver mi ficha</h2><p class="sub">Ingresa tu DNI para acceder</p>'+
    '<div class="emsg" id="em-f"></div>'+
    '<div class="dniw"><input type="number" id="di-f" class="dnii" placeholder="12345678" inputmode="numeric" /><button class="bbsc" id="bbs-f">Buscar</button></div>'+
    '<button class="bsec" id="bat-f">Atras</button>';
  document.getElementById('bbs-f').onclick = async function() {
    var dni = normDNI(document.getElementById('di-f').value);
    if(dni.length < 6) { setErr('em-f','Ingresa un DNI valido'); return; }
    var r = await sb.from('alumnos').select('*').eq('dni',dni).eq('activo',true).maybeSingle();
    if(r.data) { alu = r.data; mostrarFicha(r.data); }
    else setErr('em-f','DNI no encontrado. Si sos nuevo registrate primero.');
  };
  document.getElementById('bat-f').onclick = init;
}

async function mostrarFicha(a) {
  document.getElementById('mc').classList.add('hide');
  var fs = document.getElementById('fs');
  fs.classList.add('show');
  var ini = ((a.nombre||'')+' '+(a.apellido||'')).trim().split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  var belt = a.cinturon||'blanco';
  var bc = BELT_COLORS[belt]||'#e0e0e0';
  var gradosStr = a.stripes ? belt+' - '+a.stripes+' grado'+(a.stripes>1?'s':'') : belt;
  document.getElementById('f-name').textContent = (a.nombre||'')+' '+(a.apellido||'');
  document.getElementById('f-belt').textContent = gradosStr;
  var fav = document.getElementById('fav');
  if(a.foto_url) {
    fav.innerHTML = '<img src="'+a.foto_url+'" />';
  } else {
    fav.innerHTML = '<span>'+ini+'</span>';
  }
  fav.onclick = function() { document.getElementById('foto-inp').click(); };
  document.getElementById('foto-inp').onchange = async function(e) {
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var base64 = ev.target.result;
      fav.innerHTML = '<img src="'+base64+'" />';
      var prev = document.getElementById('foto-preview-bar');
      if(prev) prev.remove();
      var bar = document.createElement('div');
      bar.id = 'foto-preview-bar';
      bar.style.cssText = 'display:flex;gap:8px;margin:10px 1.25rem 0;';
      bar.innerHTML =
        '<button style="flex:1;padding:9px;background:linear-gradient(180deg,#e2262d,#bb171d);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer" id="btn-confirmar-foto">Confirmar foto</button>'+
        '<button style="flex:1;padding:9px;background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--rs);font-size:14px;cursor:pointer" id="btn-cancelar-foto">Cancelar</button>';
      fav.closest('.ficha-hdr').insertAdjacentElement('afterend', bar);
      document.getElementById('btn-confirmar-foto').onclick = async function() {
        bar.remove();
        await sb.from('alumnos').update({foto_url: base64}).eq('id',a.id);
        a.foto_url = base64;
        showToastF('Foto actualizada');
      };
      document.getElementById('btn-cancelar-foto').onclick = function() {
        bar.remove();
        fav.innerHTML = a.foto_url ? '<img src="'+a.foto_url+'" />' : '<span>'+ini+'</span>';
      };
    };
    reader.readAsDataURL(file);
  };

  var esMenor = false;
  if(a.fecha_nac) {
    var edad = Math.floor((new Date() - new Date(a.fecha_nac)) / (365.25*24*3600*1000));
    esMenor = edad < 18;
  }

  // Cargar torneos del alumno
  var torneos = [];
  try {
    var tr = await sb.from('torneos_participantes').select('*,torneos(nombre,fecha)').eq('alumno_id',a.id).order('created_at',{ascending:false});
    torneos = tr.data || [];
  } catch(e) {}

  // Cargar lista de torneos disponibles para registrar
  var listaTorneos = [];
  try {
    var lr = await sb.from('torneos').select('id,nombre,fecha').eq('activo',true).order('fecha',{ascending:false});
    listaTorneos = lr.data || [];
  } catch(e) {}

  var torneosHTML = '<div class="fsec-title">Competencias</div>';
  if(torneos.length) {
    torneos.forEach(function(t) {
      var pClass = t.puesto===1?'puesto-1':t.puesto===2?'puesto-2':t.puesto===3?'puesto-3':'';
      var pText = t.puesto?t.puesto+'° puesto':'Participé';
      torneosHTML += '<div class="torneo-item"><div class="torneo-nom">'+(t.torneos?t.torneos.nombre:'Torneo')+'</div><div class="torneo-sub">'+(t.torneos?t.torneos.fecha:'')+' - '+t.modalidad+' - '+t.peso+'kg</div>'+(pClass?'<span class="puesto-badge '+pClass+'">'+pText+'</span>':'')+'</div>';
    });
  } else {
    torneosHTML += '<div style="font-size:13px;color:var(--g5);padding:8px 0">Sin participaciones registradas</div>';
  }
  if(listaTorneos.length) {
    torneosHTML += '<button class="btn-add-torneo" id="badd-torneo">+ Registrar participacion</button>';
  }

  var tutorHTML = '';
  if(esMenor) {
    tutorHTML = '<div class="fsec"><div class="fsec-title">Datos del tutor</div>'+
      '<div class="frow2">'+
      '<div class="fitem"><label>Nombre</label><input type="text" class="fi" id="f-tn" value="'+(a.tutor_nombre||'')+'" placeholder="Nombre" /></div>'+
      '<div class="fitem"><label>Relacion</label><select class="fi" id="f-tr"><option value="">-</option><option '+(a.tutor_relacion==='padre'?'selected':'')+'>padre</option><option '+(a.tutor_relacion==='madre'?'selected':'')+'>madre</option><option '+(a.tutor_relacion==='tutor'?'selected':'')+'>tutor</option></select></div>'+
      '</div>'+
      '<div class="frow2">'+
      '<div class="fitem"><label>Telefono</label><input type="tel" class="fi" id="f-ttel" value="'+(a.tutor_telefono||'')+'" placeholder="+54..." /></div>'+
      '<div class="fitem"><label>Email</label><input type="email" class="fi" id="f-tem" value="'+(a.tutor_email||'')+'" placeholder="email@..." /></div>'+
      '</div></div>';
  }

  var torneosContent = torneos.length
    ? torneos.map(function(t){
        var pC=t.puesto===1?'puesto-1':t.puesto===2?'puesto-2':t.puesto===3?'puesto-3':'';
        var pT=t.puesto?t.puesto+'° puesto':'Participe';
        return '<div class="torneo-item"><div class="torneo-nom">'+(t.torneos?t.torneos.nombre:'Torneo')+'</div><div class="torneo-sub">'+(t.torneos?t.torneos.fecha:'')+' - '+t.modalidad+(t.peso?' - '+t.peso+'kg':'')+'</div>'+(pC?'<span class="puesto-badge '+pC+'">'+pT+'</span>':'')+'</div>';
      }).join('')
    : '<div style="font-size:13px;color:var(--g5);padding:8px 0">Sin participaciones registradas</div>';

  var tutorContent = esMenor
    ? '<div style="margin-top:1rem"><div class="fsec-title" style="margin-bottom:10px">Datos del tutor</div>'+
      '<div class="frow2">'+
      '<div class="fitem"><label>Nombre</label><input type="text" class="fi" id="f-tn" value="'+(a.tutor_nombre||'')+'" placeholder="Nombre" /></div>'+
      '<div class="fitem"><label>Relacion</label><select class="fi" id="f-tr"><option value="">-</option><option '+(a.tutor_relacion==='padre'?'selected':'')+' value="padre">Padre</option><option '+(a.tutor_relacion==='madre'?'selected':'')+' value="madre">Madre</option><option '+(a.tutor_relacion==='tutor'?'selected':'')+' value="tutor">Tutor</option></select></div>'+
      '</div>'+
      '<div class="frow2">'+
      '<div class="fitem"><label>Telefono</label><input type="tel" class="fi" id="f-ttel" value="'+(a.tutor_telefono||'')+'" placeholder="+54..." /></div>'+
      '<div class="fitem"><label>Email</label><input type="email" class="fi" id="f-tem" value="'+(a.tutor_email||'')+'" placeholder="email@..." /></div>'+
      '</div></div>'
    : '';

  document.getElementById('ficha-body').innerHTML =
    // ── Tab bar
    '<div class="ftabs">'+
    '<button class="ftab on" id="ftb-info" onclick="fichaTabSwitch(\'info\')">Mi info</button>'+
    '<button class="ftab" id="ftb-emerg" onclick="fichaTabSwitch(\'emerg\')">Emergencia</button>'+
    '<button class="ftab" id="ftb-comp" onclick="fichaTabSwitch(\'comp\')">Competencias</button>'+
    '</div>'+

    // ── Tab 1: Mi info
    '<div id="ftab-info" class="ftab-panel on">'+
    '<div class="frow2">'+
    '<div class="fitem"><label>Telefono</label><input type="tel" class="fi" id="f-tel" value="'+(a.telefono||'')+'" placeholder="+54..." /></div>'+
    '<div class="fitem"><label>Email</label><input type="email" class="fi" id="f-email" value="'+(a.email||'')+'" placeholder="email@..." /></div>'+
    '</div>'+
    '<div class="fitem"><label>Domicilio</label><input type="text" class="fi" id="f-dom" value="'+(a.domicilio||'')+'" placeholder="Calle, numero, piso" /></div>'+
    '<div class="fitem"><label>Instagram</label><input type="text" class="fi" id="f-ig" value="'+(a.instagram||'')+'" placeholder="@usuario" /></div>'+
    '<div class="frow2" style="margin-top:4px">'+
    '<div class="fitem"><label>Peso (kg)</label><input type="number" class="fi" id="f-peso" value="'+(a.peso||'')+'" placeholder="70" step="0.5" /></div>'+
    '<div class="fitem"><label>Altura (cm)</label><input type="number" class="fi" id="f-alt" value="'+(a.altura||'')+'" placeholder="175" /></div>'+
    '</div>'+
    '<div class="chk-row"><input type="checkbox" id="f-apto" '+(a.apto_fisico?'checked':'')+' /><label for="f-apto">Tengo apto fisico vigente</label></div>'+
    '<div class="fitem"><label>Vencimiento apto</label><input type="date" class="fi" id="f-aptov" value="'+(a.apto_vencimiento||'')+'" /></div>'+
    '<div class="chk-row"><input type="checkbox" id="f-comp" '+(a.es_competidor?'checked':'')+' /><label for="f-comp">Soy competidor / quiero competir</label></div>'+
    '</div>'+

    // ── Tab 2: Emergencia
    '<div id="ftab-emerg" class="ftab-panel">'+
    '<div class="frow2">'+
    '<div class="fitem"><label>Nombre</label><input type="text" class="fi" id="f-en" value="'+(a.emerg_nombre||'')+'" placeholder="Nombre" /></div>'+
    '<div class="fitem"><label>Relacion</label><input type="text" class="fi" id="f-er" value="'+(a.emerg_relacion||'')+'" placeholder="Esposa, padre..." /></div>'+
    '</div>'+
    '<div class="fitem"><label>Telefono de emergencia</label><input type="tel" class="fi" id="f-etel" value="'+(a.emerg_telefono||'')+'" placeholder="+54..." /></div>'+
    tutorContent+
    '</div>'+

    // ── Tab 3: Competencias
    '<div id="ftab-comp" class="ftab-panel">'+
    '<div class="fsec-title" style="margin-bottom:8px">Cinturon</div>'+
    '<div class="belt-vis" style="margin-bottom:1.25rem"><div class="belt-bar" style="background:'+(BELT_COLORS[a.cinturon||'blanco']||'#e0e0e0')+';width:50px"></div><span style="font-size:14px">'+(a.cinturon||'blanco')+(a.stripes?' - '+a.stripes+' grado'+(a.stripes>1?'s':''): '')+'</span></div>'+
    '<div class="fsec-title" style="margin-bottom:8px">Torneos</div>'+
    torneosContent+
    (listaTorneos.length?'<button class="btn-add-torneo" id="badd-torneo">+ Registrar participacion</button>':'')+
    '</div>'+

    // ── Botones
    '<div id="ficha-save-wrap">'+
    '<button class="btn-guardar-ficha" id="bgficha">Guardar cambios</button>'+
    '</div>'+
    '<button class="btn-back-ficha" id="bbficha">Volver</button>';

  function volverDesFicha() {
    document.getElementById('fs').classList.remove('show');
    document.getElementById('mc').classList.remove('hide');
    if(alu && claseSeleccionada) mkConfirm(alu); else init();
  }

  document.getElementById('bgficha').onclick = function() { guardarFicha(a, volverDesFicha); };
  document.getElementById('bbficha').onclick = volverDesFicha;

  var badd = document.getElementById('badd-torneo');
  if(badd) badd.onclick = function() { abrirModalTorneo(a, listaTorneos); };
}

function fichaTabSwitch(tab) {
  ['info','emerg','comp'].forEach(function(t){
    document.getElementById('ftab-'+t).classList.toggle('on', t===tab);
    document.getElementById('ftb-'+t).classList.toggle('on', t===tab);
  });
  var sw=document.getElementById('ficha-save-wrap');
  if(sw) sw.style.display = tab==='comp'?'none':'block';
}

async function guardarFicha(a, onDone) {
  var btn = document.getElementById('bgficha');
  if(btn){ btn.disabled=true; btn.textContent='Guardando...'; }
  var updates = {
    telefono: document.getElementById('f-tel').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    domicilio: document.getElementById('f-dom').value.trim(),
    instagram: document.getElementById('f-ig').value.trim(),
    emerg_nombre: document.getElementById('f-en').value.trim(),
    emerg_relacion: document.getElementById('f-er').value.trim(),
    emerg_telefono: document.getElementById('f-etel').value.trim(),
    apto_fisico: document.getElementById('f-apto').checked,
    apto_vencimiento: document.getElementById('f-aptov').value || null,
    es_competidor: document.getElementById('f-comp').checked,
    peso: parseFloat(document.getElementById('f-peso').value) || null,
    altura: parseFloat(document.getElementById('f-alt').value) || null,
  };
  if(a.fecha_nac) {
    var edad = Math.floor((new Date()-new Date(a.fecha_nac))/(365.25*24*3600*1000));
    if(edad < 18) {
      var ftn=document.getElementById('f-tn'), ftr=document.getElementById('f-tr');
      if(ftn) updates.tutor_nombre=ftn.value.trim();
      if(ftr) updates.tutor_relacion=ftr.value;
      var ftt=document.getElementById('f-ttel'), fte=document.getElementById('f-tem');
      if(ftt) updates.tutor_telefono=ftt.value.trim();
      if(fte) updates.tutor_email=fte.value.trim();
    }
  }
  var r = await sb.from('alumnos').update(updates).eq('id',a.id);
  if(r.error){ if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} alert('Error al guardar'); return; }
  alu = Object.assign({},a,updates);
  var body = document.getElementById('ficha-body');
  if(body) body.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1rem;text-align:center">'+
    '<div style="width:64px;height:64px;border-radius:50%;background:#e8f8ef;display:flex;align-items:center;justify-content:center;margin-bottom:1rem">'+
    '<svg width="32" height="32" fill="none" stroke="#27ae60" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>'+
    '<div style="font-size:18px;font-weight:700;margin-bottom:6px">Cambios guardados</div>'+
    '<div style="font-size:14px;color:var(--g5)">Volviendo...</div>'+
    '</div>';
  setTimeout(function(){ if(onDone) onDone(); }, 1500);
}

function abrirModalTorneo(a, listaTorneos) {
  var sel = document.getElementById('mt-torneo');
  sel.innerHTML = listaTorneos.map(function(t){ return '<option value="'+t.id+'">'+t.nombre+' ('+t.fecha+')</option>'; }).join('');
  document.getElementById('mt-peso').value = a.peso || '';
  document.getElementById('modal-torneo').classList.add('show');
  document.getElementById('mt-cancel').onclick = function() { document.getElementById('modal-torneo').classList.remove('show'); };
  document.getElementById('mt-confirm').onclick = async function() {
    var torneoId = parseInt(document.getElementById('mt-torneo').value);
    var mod = document.getElementById('mt-mod').value;
    var peso = parseFloat(document.getElementById('mt-peso').value) || null;
    var puesto = parseInt(document.getElementById('mt-puesto').value) || null;
    var cat = document.getElementById('mt-cat') ? document.getElementById('mt-cat').value : '';
    var r = await sb.from('torneos_participantes').insert({
      torneo_id:torneoId, alumno_id:a.id, nombre:a.nombre, apellido:a.apellido,
      modalidad:mod, peso:peso, cinturon:a.cinturon, puesto:puesto, categoria:cat||null, cargado_por:'alumno'
    });
    if(r.error) { alert('Error: '+r.error.message); return; }
    document.getElementById('modal-torneo').classList.remove('show');
    showToastF('Participacion registrada!');
    mostrarFicha(a);
  };
}

function showToastF(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:999;transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); },2500);
}

function selSexo(el,v) {
  sexoSel=v;
  document.querySelectorAll('.sxb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
}

function setErr(id,m){var e=document.getElementById(id);if(e){e.textContent=m;e.style.display='block';}}
function clrErr(id){var e=document.getElementById(id);if(e)e.style.display='none';}

init();
</script>
</body>
</html>
